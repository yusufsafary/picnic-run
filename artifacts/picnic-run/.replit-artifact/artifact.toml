kind = "web"
previewPath = "/"
title = "Picnic Run — 3D Runner Game"
version = "1.0.0"
id = "artifacts/picnic-run"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26006

[services.development]
run = "pnpm --filter @workspace/picnic-run run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/picnic-run", "run", "build" ]
publicDir = "artifacts/picnic-run/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26006"
BASE_PATH = "/"
